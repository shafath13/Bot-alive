<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bot Keep-Alive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #0a0d14;
      --panel:    #0f1521;
      --border:   #1e2d45;
      --green:    #00ff88;
      --blue:     #00aaff;
      --dim:      #3a5a7a;
      --text:     #c8dff0;
      --muted:    #4a6a8a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* animated grid background */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.25;
      animation: gridMove 20s linear infinite;
    }
    @keyframes gridMove { from { background-position: 0 0; } to { background-position: 40px 40px; } }

    .container {
      position: relative;
      width: 440px;
      padding: 36px;
      background: var(--panel);
      border: 1px solid var(--border);
      box-shadow: 0 0 60px rgba(0,170,255,.07), inset 0 0 30px rgba(0,0,0,.4);
    }
    /* corner accents */
    .container::before, .container::after {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      border-color: var(--blue);
      border-style: solid;
    }
    .container::before { top: -1px; left: -1px;  border-width: 2px 0 0 2px; }
    .container::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }

    .logo {
      width: 46px; height: 46px;
      background: linear-gradient(135deg, #5865F2, #7289da);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      box-shadow: 0 0 18px rgba(88,101,242,.5);
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: .12em;
      color: #fff;
      text-transform: uppercase;
    }
    h1 span { color: var(--blue); }

    .subtitle { font-size: .72rem; color: var(--muted); margin-top: 2px; }

    /* status badge */
    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      background: rgba(0,255,136,.05);
      border: 1px solid rgba(0,255,136,.15);
      margin-bottom: 24px;
    }

    .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: pulse 1.8s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: .5; transform: scale(.75); }
    }

    .status-label { font-size: .8rem; color: var(--green); letter-spacing: .1em; }
    .status-label.error { color: #ff4466; }

    /* metrics grid */
    .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }

    .metric {
      padding: 14px;
      background: rgba(255,255,255,.02);
      border: 1px solid var(--border);
    }
    .metric-label { font-size: .65rem; color: var(--muted); letter-spacing: .12em; text-transform: uppercase; margin-bottom: 6px; }
    .metric-value { font-size: 1.05rem; color: #fff; letter-spacing: .06em; }
    .metric-value.highlight { color: var(--blue); }

    /* ping log */
    .log-title {
      font-size: .65rem; color: var(--muted); letter-spacing: .12em;
      text-transform: uppercase; margin-bottom: 8px;
    }
    .log {
      height: 96px;
      overflow-y: auto;
      background: rgba(0,0,0,.3);
      border: 1px solid var(--border);
      padding: 8px 10px;
      font-size: .72rem;
      line-height: 1.7;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .log-entry { color: var(--muted); }
    .log-entry.ok  span.tag { color: var(--green); }
    .log-entry.err span.tag { color: #ff4466; }

    /* ping button */
    .btn {
      width: 100%;
      margin-top: 18px;
      padding: 13px;
      background: transparent;
      border: 1px solid var(--blue);
      color: var(--blue);
      font-family: 'Orbitron', sans-serif;
      font-size: .72rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .2s, box-shadow .2s;
    }
    .btn:hover {
      background: rgba(0,170,255,.1);
      box-shadow: 0 0 20px rgba(0,170,255,.2);
    }
    .btn:active { transform: scale(.98); }

    .footer {
      margin-top: 20px;
      font-size: .62rem;
      color: var(--dim);
      text-align: center;
      letter-spacing: .08em;
    }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="logo">🤖</div>
    <div>
      <h1>Bot <span>Keep-Alive</span></h1>
      <div class="subtitle">discord uptime monitor — auto ping active</div>
    </div>
  </div>

  <div class="status-row">
    <div class="dot" id="dot"></div>
    <div class="status-label" id="statusLabel">CHECKING STATUS…</div>
  </div>

  <div class="metrics">
    <div class="metric">
      <div class="metric-label">Uptime</div>
      <div class="metric-value highlight" id="uptime">--:--:--</div>
    </div>
    <div class="metric">
      <div class="metric-label">Last Ping</div>
      <div class="metric-value" id="lastPing">—</div>
    </div>
    <div class="metric">
      <div class="metric-label">Total Pings</div>
      <div class="metric-value" id="totalPings">0</div>
    </div>
    <div class="metric">
      <div class="metric-label">Ping Interval</div>
      <div class="metric-value">4 min</div>
    </div>
  </div>

  <div class="log-title">Ping Log</div>
  <div class="log" id="log"></div>

  <button class="btn" onclick="doPing()">⚡ Manual Ping</button>

  <div class="footer">server self-pings every 4 minutes · pair with UptimeRobot for 24/7 uptime</div>
</div>

<script>
  let totalPings = 0;

  function ts() {
    return new Date().toLocaleTimeString();
  }

  function addLog(msg, ok = true) {
    const log = document.getElementById('log');
    const el = document.createElement('div');
    el.className = 'log-entry ' + (ok ? 'ok' : 'err');
    el.innerHTML = `<span class="tag">[${ok ? 'OK' : 'ERR'}]</span> ${ts()} — ${msg}`;
    log.prepend(el);
    // keep last 50
    while (log.children.length > 50) log.removeChild(log.lastChild);
  }

  async function doPing() {
    try {
      const res = await fetch('/ping');
      const data = await res.json();
      totalPings++;
      document.getElementById('uptime').textContent = data.uptime;
      document.getElementById('lastPing').textContent = ts();
      document.getElementById('totalPings').textContent = totalPings;
      document.getElementById('statusLabel').textContent = 'ONLINE — BOT IS ALIVE';
      document.getElementById('statusLabel').className = 'status-label';
      document.getElementById('dot').style.background = 'var(--green)';
      document.getElementById('dot').style.boxShadow = '0 0 8px var(--green)';
      addLog(`HTTP ${res.status} · uptime ${data.uptime}`, true);
    } catch (e) {
      document.getElementById('statusLabel').textContent = 'ERROR — CANNOT REACH SERVER';
      document.getElementById('statusLabel').className = 'status-label error';
      document.getElementById('dot').style.background = '#ff4466';
      document.getElementById('dot').style.boxShadow = '0 0 8px #ff4466';
      addLog(`fetch failed: ${e.message}`, false);
    }
  }

  // auto-ping every 4 minutes + immediate first ping
  doPing();
  setInterval(doPing, 240_000);
</script>
</body>
</html>
